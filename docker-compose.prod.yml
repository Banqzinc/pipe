# Production docker-compose for Coolify deployment
# Coolify manages: SSL, reverse proxy, auto-deploy
#
# Secrets are resolved at runtime from 1Password via `op run`.
# Required env vars (set in Coolify UI):
#   OP_SERVICE_ACCOUNT_TOKEN - 1Password service account token for the pipe_production vault
#   DEPLOY_ENV               - "production" (used by env.default to select the correct vault)
#   NODE_ENV                 - "production"
#
# All other secrets (DATABASE_URL, JWT_SECRET, etc.) live in the
# pipe_$DEPLOY_ENV 1Password vault and are resolved via env.default.
#
# Claude CLI auth is stored in the claude_auth volume.
# After first deploy, run:
#   docker exec -it <pipe-container> claude login
# Open the URL in your browser to authenticate with Claude Max.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      - DATABASE_URL=postgres://pipe:${POSTGRES_PASSWORD:-pipe}@db:5432/pipe
      - NODE_ENV=production
      - PIPE_PORT=3100
      - PIPE_REPOS_DIR=/app/repos
    volumes:
      - pipe_repos:/app/repos
      - claude_auth:/root/.claude
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pipe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pipe}
      POSTGRES_DB: pipe
    volumes:
      - pipe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipe -d pipe"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pipe_pgdata:
  pipe_repos:
  claude_auth:
